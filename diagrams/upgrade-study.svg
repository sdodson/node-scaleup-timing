  <rect width="900" height="490" rx="8" fill="url(#bg-upgrade)"/>
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#212529">Upgrade Study: Scale-Up Time by OCP Version (ARO brazilsouth, D4s_v5)</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#868e96">Same cluster upgraded through versions — boot image fixed at 4.16. Stacked bar = mean phase time.</text>

