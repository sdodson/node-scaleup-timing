<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  <rect width="900" height="530" rx="8" fill="url(#bg)"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">OpenShift Node Scale-Up: Boot Phase Sequence</text>

  <!-- Timeline arrow -->
  <line x1="40" y1="70" x2="870" y2="70" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#495057"/></marker></defs>

  <!-- Phase boxes -->
  <!-- 1. Cloud VM Provisioning -->
  <rect x="42" y="85" width="100" height="50" rx="4" fill="#4263eb" opacity="0.85"/>
  <text x="92" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Cloud VM</text>
  <text x="92" y="120" text-anchor="middle" font-size="10" fill="white">Provisioning</text>

  <!-- 2. Boot 1: Ignition -->
  <rect x="150" y="85" width="80" height="50" rx="4" fill="#7048e8" opacity="0.85"/>
  <text x="190" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Boot 1</text>
  <text x="190" y="120" text-anchor="middle" font-size="10" fill="white">Ignition</text>

  <!-- 3. Boot 1: MCD Firstboot -->
  <rect x="238" y="85" width="220" height="50" rx="4" fill="#e03131" opacity="0.85"/>
  <text x="348" y="107" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Boot 1: MCD Firstboot</text>
  <text x="348" y="120" text-anchor="middle" font-size="10" fill="white">rpm-ostree rebase (LARGEST ~40%)</text>

  <!-- 4. Reboot -->
  <rect x="466" y="85" width="50" height="50" rx="4" fill="#495057" opacity="0.85"/>
  <text x="491" y="114" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Reboot</text>

  <!-- 5. Boot 2: chrony-wait -->
  <rect x="524" y="85" width="100" height="50" rx="4" fill="#f08c00" opacity="0.85"/>
  <text x="574" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Boot 2</text>
  <text x="574" y="120" text-anchor="middle" font-size="10" fill="white">chrony-wait</text>

  <!-- 6. Boot 2: CRI-O + Kubelet -->
  <rect x="632" y="85" width="40" height="50" rx="4" fill="#2b8a3e" opacity="0.85"/>
  <text x="652" y="107" text-anchor="middle" font-size="8" fill="white" font-weight="bold">CRI-O</text>
  <text x="652" y="118" text-anchor="middle" font-size="8" fill="white">Kube</text>

  <!-- 7. Kubelet to NodeReady -->
  <rect x="680" y="85" width="170" height="50" rx="4" fill="#1971c2" opacity="0.85"/>
  <text x="765" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Kubelet to NodeReady</text>
  <text x="765" y="120" text-anchor="middle" font-size="10" fill="white">CSR + CNI image pulls (~15-21%)</text>

  <!-- Annotations -->
  <text x="92" y="155" text-anchor="middle" font-size="9" fill="#495057">29-77s</text>
  <text x="190" y="155" text-anchor="middle" font-size="9" fill="#495057">11-19s</text>
  <text x="348" y="155" text-anchor="middle" font-size="9" fill="#495057">100-199s</text>
  <text x="491" y="155" text-anchor="middle" font-size="9" fill="#495057">5-41s</text>
  <text x="574" y="155" text-anchor="middle" font-size="9" fill="#495057">24s</text>
  <text x="652" y="155" text-anchor="middle" font-size="9" fill="#495057">1-3s</text>
  <text x="765" y="155" text-anchor="middle" font-size="9" fill="#495057">47-64s</text>

  <!-- Divider -->
  <line x1="40" y1="175" x2="860" y2="175" stroke="#dee2e6" stroke-width="1"/>

  <!-- MCD firstboot detail breakdown -->
  <text x="40" y="200" font-size="12" font-weight="bold" fill="#212529">MCD Firstboot Detail (the biggest phase):</text>

  <rect x="42" y="215" width="130" height="35" rx="3" fill="#e03131" opacity="0.6"/>
  <text x="107" y="237" text-anchor="middle" font-size="9" fill="white" font-weight="bold">MCD Image Pull (11-23s)</text>

  <rect x="180" y="215" width="170" height="35" rx="3" fill="#e03131" opacity="0.75"/>
  <text x="265" y="237" text-anchor="middle" font-size="9" fill="white" font-weight="bold">machine-os Image Pull (15-41s)</text>

  <rect x="358" y="215" width="230" height="35" rx="3" fill="#e03131" opacity="0.9"/>
  <text x="473" y="237" text-anchor="middle" font-size="9" fill="white" font-weight="bold">rpm-ostree Rebase (39-72s)</text>

  <rect x="596" y="215" width="130" height="35" rx="3" fill="#e03131" opacity="0.5"/>
  <text x="661" y="237" text-anchor="middle" font-size="9" fill="white" font-weight="bold">ostree Finalize (8-24s)</text>

  <!-- Kubelet to NodeReady detail breakdown -->
  <line x1="40" y1="265" x2="860" y2="265" stroke="#dee2e6" stroke-width="1"/>
  <text x="40" y="290" font-size="12" font-weight="bold" fill="#212529">Kubelet to NodeReady Detail (second-largest phase):</text>

  <!-- Sub-phase boxes -->
  <rect x="42" y="300" width="65" height="35" rx="3" fill="#2b8a3e" opacity="0.7"/>
  <text x="74" y="316" text-anchor="middle" font-size="9" fill="white" font-weight="bold">CSR</text>
  <text x="74" y="328" text-anchor="middle" font-size="8" fill="white">Approval</text>

  <rect x="111" y="300" width="580" height="35" rx="3" fill="#1971c2" opacity="0.85"/>
  <text x="401" y="316" text-anchor="middle" font-size="10" fill="white" font-weight="bold">CNI Image Pulls + Pod Startup</text>
  <text x="401" y="328" text-anchor="middle" font-size="9" fill="white">75-85% of phase — network-bound</text>

  <rect x="695" y="300" width="135" height="35" rx="3" fill="#2b8a3e" opacity="0.7"/>
  <text x="762" y="316" text-anchor="middle" font-size="9" fill="white" font-weight="bold">CNI Ready</text>
  <text x="762" y="328" text-anchor="middle" font-size="8" fill="white">→ NodeReady</text>

  <!-- Sub-phase time annotations -->
  <text x="74" y="349" text-anchor="middle" font-size="9" fill="#495057">&lt;2s</text>
  <text x="401" y="349" text-anchor="middle" font-size="9" fill="#495057">~50s</text>
  <text x="762" y="349" text-anchor="middle" font-size="9" fill="#495057">~4s</text>

  <!-- Blocking image pulls breakdown -->
  <text x="42" y="372" font-size="10" font-weight="bold" fill="#495057">Critical-path image pulls (~5.3 GB total, blocks NodeReady):</text>

  <!-- Row 1: CNI plugin DaemonSets (largest images) -->
  <rect x="42" y="385" width="395" height="30" rx="3" fill="#1971c2" opacity="0.85"/>
  <text x="239" y="404" text-anchor="middle" font-size="9" fill="white" font-weight="bold">multus-cni (1.4 GB)</text>

  <rect x="441" y="385" width="389" height="30" rx="3" fill="#1971c2" opacity="0.75"/>
  <text x="635" y="404" text-anchor="middle" font-size="9" fill="white" font-weight="bold">ovn-kubernetes (1.4 GB)</text>

  <!-- Row 2: CNI init containers + pause (widths proportional to image size) -->
  <rect x="42" y="419" width="196" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="140" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">whereabouts-ipam</text>
  <text x="140" y="443" text-anchor="middle" font-size="7.5" fill="white">636 MB</text>

  <rect x="241" y="419" width="185" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="333" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">networking-plugins</text>
  <text x="333" y="443" text-anchor="middle" font-size="7.5" fill="white">600 MB</text>

  <rect x="429" y="419" width="126" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="492" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">egress-router</text>
  <text x="492" y="443" text-anchor="middle" font-size="7.5" fill="white">409 MB</text>

  <rect x="558" y="419" width="91" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="603" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">bond-cni</text>
  <text x="603" y="443" text-anchor="middle" font-size="7.5" fill="white">294 MB</text>

  <rect x="652" y="419" width="89" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="696" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">route-override</text>
  <text x="696" y="443" text-anchor="middle" font-size="7.5" fill="white">290 MB</text>

  <rect x="744" y="419" width="86" height="30" rx="3" fill="#1971c2" opacity="0.65"/>
  <text x="787" y="432" text-anchor="middle" font-size="8" fill="white" font-weight="bold">pause</text>
  <text x="787" y="443" text-anchor="middle" font-size="7.5" fill="white">278 MB</text>

  <!-- Legend -->
  <line x1="40" y1="465" x2="860" y2="465" stroke="#dee2e6" stroke-width="1"/>
  <text x="40" y="490" font-size="11" font-weight="bold" fill="#212529">Legend:</text>
  <rect x="105" y="478" width="14" height="14" rx="2" fill="#e03131" opacity="0.85"/>
  <text x="125" y="490" font-size="10" fill="#495057">I/O-bound (benefits from faster storage)</text>
  <rect x="370" y="478" width="14" height="14" rx="2" fill="#f08c00" opacity="0.85"/>
  <text x="390" y="490" font-size="10" fill="#495057">Network/NTP-bound (fixed cost)</text>
  <rect x="580" y="478" width="14" height="14" rx="2" fill="#1971c2" opacity="0.85"/>
  <text x="600" y="490" font-size="10" fill="#495057">Network-bound (image pulls)</text>

  <text x="450" y="518" text-anchor="middle" font-size="9" fill="#868e96">Timings from Azure D4s_v5 and D32s_v3/v5 tests (OCP 4.20, eastus2). Box widths proportional to image size.</text>
</svg>
