<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg-aro-scatter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" rx="8" fill="url(#bg-aro-scatter)"/>
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#212529">ARO Scale-Up Time: 30 Samples Across 10 Rounds × 3 Zones (D4s_v5, brazilsouth)</text>
  <text x="450" y="46" text-anchor="middle" font-size="10" fill="#868e96">No zonal differences. Rounds 9-10 show elevated Boot 1 times (regional I/O contention).</text>

  <!-- Y-axis -->
  <line x1="70" y1="65" x2="70" y2="370" stroke="#495057" stroke-width="1"/>
  <text x="18" y="218" text-anchor="middle" font-size="11" fill="#495057" transform="rotate(-90, 18, 218)">Total Scale-Up Time (seconds)</text>

  <!-- Y-axis: range 250-450, scale: 1s = 1.525px, origin at y=370 for 250s -->
  <!-- 250=>370, 300=>293.75, 350=>217.5, 400=>141.25, 450=>65 -->
  <line x1="65" y1="370" x2="70" y2="370" stroke="#495057"/><text x="60" y="374" text-anchor="end" font-size="9" fill="#495057">250</text>
  <line x1="65" y1="294" x2="70" y2="294" stroke="#495057"/><text x="60" y="298" text-anchor="end" font-size="9" fill="#495057">300</text>
  <line x1="65" y1="218" x2="70" y2="218" stroke="#495057"/><text x="60" y="222" text-anchor="end" font-size="9" fill="#495057">350</text>
  <line x1="65" y1="141" x2="70" y2="141" stroke="#495057"/><text x="60" y="145" text-anchor="end" font-size="9" fill="#495057">400</text>
  <line x1="65" y1="65" x2="70" y2="65" stroke="#495057"/><text x="60" y="69" text-anchor="end" font-size="9" fill="#495057">450</text>

  <!-- Grid lines -->
  <line x1="70" y1="370" x2="840" y2="370" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="70" y1="294" x2="840" y2="294" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="70" y1="218" x2="840" y2="218" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="70" y1="141" x2="840" y2="141" stroke="#dee2e6" stroke-width="0.5" stroke-dasharray="4"/>

  <!-- X-axis -->
  <line x1="70" y1="370" x2="840" y2="370" stroke="#495057" stroke-width="1"/>

  <!-- X-axis labels: rounds 1-10, spaced at 75px starting at 110 -->
  <text x="110" y="388" text-anchor="middle" font-size="10" fill="#495057">R1</text>
  <text x="185" y="388" text-anchor="middle" font-size="10" fill="#495057">R2</text>
  <text x="260" y="388" text-anchor="middle" font-size="10" fill="#495057">R3</text>
  <text x="335" y="388" text-anchor="middle" font-size="10" fill="#495057">R4</text>
  <text x="410" y="388" text-anchor="middle" font-size="10" fill="#495057">R5</text>
  <text x="485" y="388" text-anchor="middle" font-size="10" fill="#495057">R6</text>
  <text x="560" y="388" text-anchor="middle" font-size="10" fill="#495057">R7</text>
  <text x="635" y="388" text-anchor="middle" font-size="10" fill="#495057">R8</text>
  <text x="710" y="388" text-anchor="middle" font-size="10" fill="#495057">R9</text>
  <text x="785" y="388" text-anchor="middle" font-size="10" fill="#495057">R10</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#495057">Round</text>

  <!-- Mean line at 335s => y = 370 - (335-250)*1.525 = 370 - 129.6 = 240.4 -->
  <line x1="70" y1="240" x2="840" y2="240" stroke="#212529" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="850" y="244" font-size="9" fill="#212529" font-weight="bold">Mean 335s</text>

  <!-- +1 SD at 375s => y = 370 - 125*1.525 = 370-190.6 = 179.4 -->
  <line x1="70" y1="179" x2="840" y2="179" stroke="#868e96" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="850" y="183" font-size="8" fill="#868e96">+1 SD</text>

  <!-- -1 SD at 295s => y = 370 - 45*1.525 = 370-68.6 = 301.4 -->
  <line x1="70" y1="301" x2="840" y2="301" stroke="#868e96" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="850" y="305" font-size="8" fill="#868e96">−1 SD</text>

  <!-- Data points: y = 370 - (value - 250) * 1.525 -->
  <!-- Zone 1 = red circles, Zone 2 = blue squares, Zone 3 = green diamonds -->

  <!-- R1: Z1=329 y=249.5, Z2=327 y=252.6, Z3=327 y=252.6 -->
  <circle cx="100" cy="250" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="107" y="248" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="125,253 130,247 135,253 130,259" fill="#2b8a3e" opacity="0.8"/>

  <!-- R2: Z1=327 y=252.6, Z2=326 y=254.1, Z3=332 y=244.9 -->
  <circle cx="175" cy="253" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="182" y="249" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="200,245 205,239 210,245 205,251" fill="#2b8a3e" opacity="0.8"/>

  <!-- R3: Z1=323 y=258.7, Z2=321 y=261.8, Z3=322 y=260.2 -->
  <circle cx="250" cy="259" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="257" y="257" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="275,260 280,254 285,260 280,266" fill="#2b8a3e" opacity="0.8"/>

  <!-- R4: Z1=311 y=277.0, Z2=316 y=269.4, Z3=308 y=281.6 -->
  <circle cx="325" cy="277" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="332" y="264" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="350,282 355,276 360,282 355,288" fill="#2b8a3e" opacity="0.8"/>

  <!-- R5: Z1=314 y=272.4, Z2=315 y=270.9, Z3=312 y=275.5 -->
  <circle cx="400" cy="272" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="407" y="266" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="425,276 430,270 435,276 430,282" fill="#2b8a3e" opacity="0.8"/>

  <!-- R6: Z1=298 y=296.8, Z2=297 y=298.3, Z3=301 y=292.2 -->
  <circle cx="475" cy="297" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="482" y="293" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="500,292 505,286 510,292 505,298" fill="#2b8a3e" opacity="0.8"/>

  <!-- R7: Z1=343 y=228.2, Z2=340 y=232.8, Z3=338 y=235.8 -->
  <circle cx="550" cy="228" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="557" y="228" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="575,236 580,230 585,236 580,242" fill="#2b8a3e" opacity="0.8"/>

  <!-- R8: Z1=294 y=302.9, Z2=293 y=304.4, Z3=297 y=298.3 -->
  <circle cx="625" cy="303" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="632" y="299" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="650,298 655,292 660,298 655,304" fill="#2b8a3e" opacity="0.8"/>

  <!-- R9: Z1=430 y=95.5, Z2=428 y=98.6, Z3=427 y=100.1 -->
  <circle cx="700" cy="96" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="707" y="94" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="725,100 730,94 735,100 730,106" fill="#2b8a3e" opacity="0.8"/>

  <!-- R10: Z1=387 y=161.1, Z2=382 y=168.7, Z3=387 y=161.1 -->
  <circle cx="775" cy="161" r="5" fill="#e03131" opacity="0.8"/>
  <rect x="782" y="164" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <polygon points="800,161 805,155 810,161 805,167" fill="#2b8a3e" opacity="0.8"/>

  <!-- Legend -->
  <line x1="70" y1="420" x2="840" y2="420" stroke="#dee2e6" stroke-width="1"/>
  <circle cx="110" cy="440" r="5" fill="#e03131" opacity="0.8"/>
  <text x="120" y="444" font-size="10" fill="#495057">Zone 1 (mean 336s)</text>
  <rect x="250" y="435" width="10" height="10" rx="1" fill="#4263eb" opacity="0.8"/>
  <text x="265" y="444" font-size="10" fill="#495057">Zone 2 (mean 335s)</text>
  <polygon points="400,440 406,434 412,440 406,446" fill="#2b8a3e" opacity="0.8"/>
  <text x="418" y="444" font-size="10" fill="#495057">Zone 3 (mean 335s)</text>
  <line x1="550" y1="440" x2="580" y2="440" stroke="#212529" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="586" y="444" font-size="10" fill="#495057">Overall mean</text>
  <line x1="690" y1="440" x2="720" y2="440" stroke="#868e96" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="726" y="444" font-size="10" fill="#495057">± 1 SD</text>
</svg>
