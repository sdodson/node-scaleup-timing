apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-pre-pull-cni
spec:
  config:
    ignition:
      version: 3.2.0
    systemd:
      units:
        - name: pre-pull-cni-images.service
          enabled: true
          contents: |
            [Unit]
            Description=Pre-pull NodeReady-blocking CNI images during firstboot
            # Run after ignition and pivot so network + registries.conf are ready.
            # Run in parallel with MCD firstboot — do NOT depend on it finishing.
            After=ignition-firstboot-complete.service
            After=network-online.target
            Wants=network-online.target
            # Only run on firstboot — no point re-pulling on existing nodes.
            ConditionPathExists=/etc/machine-config-daemon/currentconfig
            ConditionFirstBoot=true

            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/pre-pull-cni-images.sh
            # Don't block reboot. If MCD finishes and calls reboot while we're
            # still pulling, systemd sends SIGTERM — we exit cleanly.
            TimeoutStartSec=300
            # Failure is non-fatal — worst case we fall back to normal pull in Boot 2.
            SuccessExitStatus=0 1 143
            StandardOutput=journal+console
            StandardError=journal+console

            [Install]
            WantedBy=multi-user.target
    storage:
      files:
        - path: /usr/local/bin/pre-pull-cni-images.sh
          mode: 0755
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
