apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-chrony-wait-skip-reboot
spec:
  config:
    ignition:
      version: 3.4.0
    systemd:
      units:
        - name: chrony-wait.service
          dropins:
            - name: 10-skip-if-previously-synced.conf
              contents: |
                # Skip chrony-wait when the chrony driftfile exists, indicating
                # the clock was previously synced (e.g., Boot 2 after MCD firstboot).
                #
                # On a fresh provision (Boot 1), the driftfile does not exist yet,
                # so chrony-wait runs normally and blocks until NTP sync completes.
                # After chronyd runs during Boot 1 and writes the driftfile, subsequent
                # boots skip the wait — chronyd still syncs in the background, but
                # kubelet startup is no longer blocked.
                #
                # Uses ConditionPathExists (evaluated by systemd before sandboxing)
                # instead of ExecCondition (which inherits the service's strict
                # PrivateUsers/ProtectSystem sandbox and silently fails).
                [Unit]
                ConditionPathExists=!/var/lib/chrony/drift
