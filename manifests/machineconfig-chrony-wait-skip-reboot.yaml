apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-chrony-wait-skip-reboot
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      files:
        - path: /usr/local/bin/chrony-ntp-synced-check.sh
          mode: 0755
          contents:
            source: "data:text/plain;charset=utf-8;base64,IyEvYmluL2Jhc2gKU1RBTVA9L3Zhci9saWIvbnRwLXN5bmNlZApGTEFHPS9ydW4vY2hyb255LXJlY2VudGx5LXN5bmNlZAppZiBbIC1mICIkU1RBTVAiIF07IHRoZW4KICAgIEFHRT0kKCggJChkYXRlICslcykgLSAkKHN0YXQgLWMgJVkgIiRTVEFNUCIpICkpCiAgICBpZiBbICIkQUdFIiAtbHQgMzYwMCBdOyB0aGVuCiAgICAgICAgdG91Y2ggIiRGTEFHIgogICAgZmkKZmkK"
    systemd:
      units:
        - name: chrony-wait.service
          dropins:
            - name: 10-stamp-on-sync.conf
              contents: |
                [Unit]
                After=coreos-platform-chrony-config.service
                [Service]
                ReadWritePaths=/var/lib
                ExecStartPost=/usr/bin/touch /var/lib/ntp-synced
            - name: 20-skip-if-recently-synced.conf
              contents: |
                [Unit]
                ConditionPathExists=!/run/chrony-recently-synced
        - name: chrony-ntp-synced-check.service
          enabled: true
          contents: |
            [Unit]
            Description=Skip chrony-wait if NTP was recently synchronized
            Wants=chrony-wait.service
            Before=chrony-wait.service

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/usr/local/bin/chrony-ntp-synced-check.sh

            [Install]
            WantedBy=multi-user.target
