apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: worker
  name: 99-worker-chrony-wait-skip-reboot
spec:
  config:
    ignition:
      version: 3.4.0
    storage:
      files:
        - path: /usr/local/bin/chrony-drift-check.sh
          mode: 0755
          contents:
            source: data:text/plain;charset=utf-8;base64,
    systemd:
      units:
        - name: chrony-drift-check.service
          enabled: true
          contents: |
            [Unit]
            Description=Check if chrony drift file is recent
            After=chronyd.service
            Before=chrony-wait.service
            [Service]
            Type=oneshot
            ExecStart=/usr/local/bin/chrony-drift-check.sh
            RemainAfterExit=yes
            [Install]
            WantedBy=multi-user.target
        - name: chrony-wait.service
          dropins:
            - name: 10-skip-if-recently-synced.conf
              contents: |
                [Unit]
                ConditionPathExists=!/run/chrony-recently-synced
